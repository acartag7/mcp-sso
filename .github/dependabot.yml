version: 2
# Advisory update PRs only. Each is reviewed and merged only after the 15-day
# release-age rule (docs/dependency-ledger.md) and the exact-pin + committed
# lockfile discipline — Dependabot does NOT know about the age rule, so apply it
# manually before merging.
#
# github-actions: surfaces new action SHAs to re-pin (the ecosystem where the
#   manual re-pin chore pays off most). npm CVEs arrive via the Dependabot
#   security-alerts toggle; add an npm version-updates entry here only if you
#   want advisory bumps for jose / the optional peers (mysql2, ioredis).
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch all github-actions updates into ONE PR (otherwise Dependabot opens a
      # separate PR per uses: line — e.g. 3 PRs for the same codeql-action version).
      github-actions:
        patterns: ["*"]
