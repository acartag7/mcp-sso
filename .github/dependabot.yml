version: 2
# Dependabot SECURITY alerts (CVEs) are configured via GitHub's Security &
# Advisories toggle, not here — they arrive as alerts regardless of this file.
#
# Version-update PRs for github-actions are now handled by Renovate
# (renovate.json) with minimumReleaseAge: 15 days — the release-age floor
# Dependabot can't enforce natively. Install the Renovate GitHub App
# (https://github.com/apps/renovate) to activate it.
#
# To re-enable Dependabot version updates for npm (jose / optional peers), add:
#   - package-ecosystem: npm
#     directory: /
#     schedule:
#       interval: weekly
