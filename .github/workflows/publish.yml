name: publish

# Publish to npm with --provenance (Sigstore/OIDC). NEVER auto-runs on push to main.
# Real publish only on a `v*.*.*` tag; workflow_dispatch defaults to a dry run so the
# tarball can be validated without publishing. No local publishes (see the threat model).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate the tarball; do not publish)"
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # OIDC for npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish # gate: require explicit approval before any real publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-18)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9 (2026-06-15)
        with:
          version: 10.34.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-04-20)
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck && pnpm check:lines && pnpm test
      - run: pnpm build
      - name: npm publish (dry-run OR provenance)
        run: npm publish ${{ inputs.dry_run == false && '--provenance' || '--dry-run' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
