name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lines · test · build
    runs-on: ubuntu-latest

    # Integration backends for the MySQL StorePort (src/store/mysql) and the
    # Redis/Valkey RateLimitPort (src/rate-limit/redis). The adapter tests gate on
    # MYSQL_URL/REDIS_URL and HARD-FAIL in CI if either is unset (docs review B3), so
    # a wiring typo can never silently skip coverage and print a green checkmark.
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: mcp_sso
          MYSQL_USER: mcp
          MYSQL_PASSWORD: mcppw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u mcp -pmcppw --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=18
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      CI: "true"
      MYSQL_URL: mysql://mcp:mcppw@127.0.0.1:3306/mcp_sso?charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      # SHA-pinned actions (see docs/dependency-ledger.md). Bump by resolving a new
      # tag's commit SHA and re-checking the 15-day rule.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-18)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9 (2026-06-15)
        with:
          version: 10.34.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-04-20)
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check:lines
      # B3: hard-fail if the integration env did not reach the test process.
      - name: assert integration env present
        run: |
          node -e "if(!process.env.MYSQL_URL||!process.env.REDIS_URL){console.error('FATAL: MYSQL_URL/REDIS_URL missing — adapters would be silently skipped');process.exit(1)}else{console.log('MYSQL_URL + REDIS_URL present')}"
      - run: pnpm test
      # Build smoke: the published artifact (tsc -> dist) must compile.
      - name: build smoke
        run: pnpm build
