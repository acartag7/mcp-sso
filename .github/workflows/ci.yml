name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lines · test · build
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned actions (see docs/dependency-ledger.md). Bump by resolving a new
      # tag's commit SHA and re-checking the 15-day rule.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-18)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9 (2026-06-15)
        with:
          version: 10.34.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-04-20)
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check:lines
      - run: pnpm test
      # Build smoke: the published artifact (tsc -> dist) must compile.
      - name: build smoke
        run: pnpm build
